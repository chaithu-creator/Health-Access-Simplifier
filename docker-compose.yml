services:
  backend:
    build:
      context: ./backend
    container_name: has-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4000/api
    container_name: has-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
